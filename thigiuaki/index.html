<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Lab Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="page-title">Computer Lab</h1>
        
        <button class="btn btn-add" id="btn-open-modal">Add</button>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Room name</th>
                        <th>Room code</th>
                        <th>Computers</th>
                        <th>Manager</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="student-table-body"> 
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="student-modal">
        <div class="modal-content">
            <h2 id="modal-title">Add room</h2>
            <form id="student-form">
                <div class="form-group">
                    <label>Room name *</label>
                    <input type="text" id="room-name" placeholder="e.g Web Programming Lab">
                    <span class="error-msg" id="err-name"></span>
                </div>

                <div class="form-group">
                    <label>Room code *</label>
                    <input type="text" id="room-code" placeholder="e.g PM201">
                    <span class="error-msg" id="err-code"></span>
                </div>

                <div class="form-group">
                    <label>Computers *</label>
                    <input type="number" id="computers" placeholder="Integer from 1 to 60 (e.g 40)">
                    <span class="error-msg" id="err-computers"></span>
                </div>

                <div class="form-group">
                    <label>Manager *</label>
                    <input type="text" id="manager" placeholder="Manager full name">
                    <span class="error-msg" id="err-manager"></span>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="domain.com">
                    <span class="error-msg" id="err-email"></span>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn btn-save">Save</button>
                    <button type="button" class="btn btn-cancel" id="btn-close-modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

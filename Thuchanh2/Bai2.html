<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe's Travel Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Destinations</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <button class="btn-discover">Discover places</button>
            </div>
        </section>

        <section class="highlights-section">
            <h2>HIGHLIGHTS</h2>
            
            <div class="cards-container">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1514214246283-d427a95c5d2f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Miami">
                    <p>MIAMI USA</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1595867499645-02d2fc76b74e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Munich">
                    <p>MUNICH GERMANY</p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1583422409516-15eba53492ee?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Barcelona">
                    <p>BARCELONA SPAIN</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
    </footer>

</body>
</html>

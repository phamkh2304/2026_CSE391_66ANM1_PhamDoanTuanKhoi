<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe's Travel Page</title>
    <link rel="stylesheet" href="Bai2.css">
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Destinations</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <button class="btn-discover">Discover places</button>
            </div>
        </section>

        <section class="highlights-section">
            <h2>HIGHLIGHTS</h2>
            
            <div class="cards-container">
                <div class="card">
                    <img src="/Thuchanh2/image/miami.jpg" alt="miami">
                    <p>MIAMI USA</p>
                </div>
                <div class="card">
                    <img src="/Thuchanh2/image/munich.jpg" alt="munich">
                    <p>MUNICH GERMANY</p>
                </div>
                <div class="card">
                    <img src="/Thuchanh2/image/barcelona.jpg" alt="barcelona">
                    <p>BARCELONA SPAIN</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        
        <a href="#"><img src="/Thuchanh2/image/insta.png" alt="instagram" class="social-icon"></img>
        </a>
        <a href="#"><img src="/Thuchanh2/image/facebook.png" alt="facebook" class="social-icon"></a>
    </footer>

</body>
</html>

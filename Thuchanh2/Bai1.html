<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Form Layout</title>
    <link rel="stylesheet" href="Bai1.css">
</head>
<body>
    <div class="form-container">
        <h2>Get in touch with us by filling contact form below</h2>
        
        <form action="#">
            <div class="form-row">
                <input type="text" name="" id="" placeholder="* Enter your full name" required>
                <input type="email" name="" id="" placeholder="* Enter your email address" required>
            </div>
            
            <div class="form-row">
                <input type="text" name="" id="" placeholder="Enter your subject">
            </div>
            
            <div class="form-row">
                <textarea placeholder="* Your message here..." rows="8" required></textarea>
            </div>
            
            <div class="form-footer">
                <button type="submit">Send message</button>
                <span class="note">* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>
</body>
</html>
